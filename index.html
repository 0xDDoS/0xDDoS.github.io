<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comics Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: rgb(13, 13, 13);
            color: white;
            min-height: 100vh;
        }

        header {
            background-color: rgb(13, 13, 13);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .comics-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .comic-card {
            display: flex;
            gap: 1rem;
        }

        .comic-cover {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
        }

        .comic-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .comic-title {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .comic-original-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .comic-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chapters {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .chapters::before {
            content: "📄";
            font-size: 0.875rem;
        }

        .status {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Status Colors */
        .status-ongoing {
            background-color: rgb(22, 101, 52);
            color: rgb(74, 222, 128);
        }

        .status-paused {
            background-color: rgb(153, 101, 21);
            color: rgb(255, 193, 7);
        }

        .status-completed {
            background-color: rgb(28, 58, 106);
            color: rgb(129, 178, 255);
        }

        .status-dropped {
            background-color: rgb(252, 3, 19);
            color: rgb(242, 240, 240);
        }

        .comic-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        /* New Button Styles */
        .action-button {
            background-color: rgba(30, 41, 59, 0.5);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .action-button:hover {
            background-color: rgba(51, 65, 85, 0.5);
        }

        .button-logo {
            width: 16px;
            height: 16px;
        }

        .button-text {
            color: rgb(209, 213, 219);
            font-size: 0.875rem;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (min-width: 768px) {
            .comics-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }

            .comic-card {
                gap: 1.5rem;
            }

            .comic-cover {
                width: 180px;
                height: 240px;
            }

            .comic-title {
                font-size: 1.25rem;
            }

            header {
                padding: 1rem 2rem;
            }

            main {
                padding: 2rem;
            }

            nav a {
                font-size: 1rem;
            }

        }

        .logo {
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <img src="img/intruder.png" alt="Logo" class="logo">
                <a href="#">🏠</a>
                <a href="#">🔞</a>
                <a href="#">📽️</a>
                <a href="#">🛑</a>
            </div>
        </nav>
    </header>

    <main>
        <h1>All comics</h1>
        <div class="comics-container" id="comicsContainer">
            <!-- Comics will be inserted here by JavaScript -->
        </div>
    </main>

    <footer>
        <p>© 2024 FSOCIETY</p>
    </footer>

    <script>
        const comics = [
            {
                title: "Solo Leveling",
                originalTitle: "Solo Leveling | 나 혼자만 레벨업 | I Alone Level-Up | ",
                chapters: 179,
                status: "ONGOING",
                image: "img/cover/Solo_Leveling.jpg",  // Replace with your image URL
                readLink: "https://page.kakao.com/content/50866481?utm_source=comick",
                favLink: "https://example.com/favorites",
                rawIcon: "img/icons/kakao.png",  // Replace with your RAW icon image
                engIcon: "img/icons/comick.webp"   // Replace with your ENG icon image
            },
            {
                title: "Reincarnated as a Genius Prodigy of a Prestigious Family",
                originalTitle: "명가의 영대로 재능천재로 환생했다 | Reborn as the Greatest Talent of the Noble Family",
                chapters: 24,
                status: "PAUSED",
                image: "img/1.png",  // Replace with your image URL
                readLink: "https://example.com/comic/2",
                favLink: "https://example.com/favorites",
                rawIcon: "img/icons/tapas.png",  // Replace with your RAW icon image
                engIcon: "img/icons/webtoon.png"   // Replace with your ENG icon image
            },
            {
                title: "The Completed Adventure of the Reincarnated Sword Master",
                originalTitle: "환생 검술가의 완결된 모험기 | The Completed Adventure of the Reincarnated Sword Master",
                chapters: 3024,
                status: "COMPLETED",
                image: "img/1.png",
                readLink: "https://example.com/comic/3",
                favLink: "https://example.com/favorites",
                rawIcon: "img/icons/tapas.png",  // Replace with your RAW icon image
                engIcon: "img/icons/webtoon.png"   // Replace with your ENG icon image
            },
            {
                title: "The Completed Adventure of the Reincarnated Sword Master",
                originalTitle: "환생 검술가의 완결된 모험기 | The Completed Adventure of the Reincarnated Sword Master",
                chapters: 3024,
                status: "DROPPED",
                image: "img/1.png",
                readLink: "https://example.com/comic/4",
                favLink: "https://example.com/favorites",
                rawIcon: "img/icons/tapas.png",  // Replace with your RAW icon image
                engIcon: "img/icons/webtoon.png"   // Replace with your ENG icon image
            }
        ];

    function createComicCard(comic) {
        let statusClass;
        switch (comic.status) {
            case "ONGOING":
                statusClass = "status-ongoing";
                break;
            case "PAUSED":
                statusClass = "status-paused";
                break;
            case "COMPLETED":
                statusClass = "status-completed";
                break;
            case "DROPPED":
                statusClass = "status-dropped";
                break;
            default:
                statusClass = "";
        }

        return `
            <div class="comic-card">
                <picture>
                    <source media="(min-width: 768px)" srcset="${comic.image}">
                    <img src="${comic.image}" alt="${comic.title}" class="comic-cover">
                </picture>
                <div class="comic-info">
                    <h2 class="comic-title">${comic.title}</h2>
                    <p class="comic-original-title">${comic.originalTitle}</p>
                    <div class="comic-meta">
                        <span class="chapters">${comic.chapters} Ch</span>
                        <span class="status ${statusClass}">${comic.status}</span>
                    </div>
                    <div class="comic-actions">
                        <a href="${comic.readLink}" class="action-button" target="_blank">
                            <img src="${comic.rawIcon}" alt="Raw" class="button-logo">
                            <span class="button-text">Raw</span>
                        </a>
                        <a href="${comic.favLink}" class="action-button" target="_blank">
                            <img src="${comic.engIcon}" alt="Eng" class="button-logo">
                            <span class="button-text">Eng</span>
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function displayComics(comics) {
        const comicsContainer = document.getElementById('comicsContainer');
        comicsContainer.innerHTML = comics.map(createComicCard).join('');
    }

    displayComics(comics);
</script>
</body>
</html>
