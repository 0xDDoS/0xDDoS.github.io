<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comics Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: rgb(13, 13, 13);
            color: white;
            min-height: 100vh;
        }

        header {
            background-color: rgb(13, 13, 13);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-right {
            display: flex;
            gap: 0.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .comics-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .comic-card {
            display: flex;
            gap: 1rem;
        }

        .comic-cover {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
        }

        .comic-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .comic-title {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .comic-original-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .comic-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stars {
            color: #ffd700;
            font-size: 0.875rem;
            letter-spacing: 1px;
        }

        .chapters {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .chapters::before {
            content: "📄";
            font-size: 0.875rem;
        }

        .status {
            background-color: rgb(22, 101, 52);
            color: rgb(74, 222, 128);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .comic-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-logo {
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0.5rem;
            font-size: 1.25rem;
        }

        @media (min-width: 768px) {
            .comics-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }

            .comic-card {
                gap: 1.5rem;
            }

            .comic-cover {
                width: 180px;
                height: 240px;
            }

            .comic-title {
                font-size: 1.25rem;
            }

            header {
                padding: 1rem 2rem;
            }

            main {
                padding: 2rem;
            }

            nav a {
                font-size: 1rem;
            }

            .comic-description {
                -webkit-line-clamp: 3;
            }
        }

        .logo {
            width: 32px;
            height: 32px;
        }

        .chapter-count {
            display: none;
        }

        @media (min-width: 768px) {
            .chapter-count {
                display: inline;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <img src="img/intruder.png" alt="Logo" class="logo">
                <a href="#">Homepage</a>
                <a href="#">Series</a>
            </div>
        </nav>
    </header>

    <main>
        <h1>All comics</h1>
        <div class="comics-container" id="comicsContainer">
            <!-- Comics will be inserted here by JavaScript -->
        </div>
    </main>

    <footer>
        <img src="/api/placeholder/32/32" alt="Footer Logo" class="footer-logo">
        <p>© 2024 Reaper Scans</p>
    </footer>

    <script>
        const comics = [
            {
                title: "Regressing as the Reincarnated Bastard of the Sword Clan",
                originalTitle: "화귀검가의 서자가 사는 법 | How to Survive as the Bastard of the Regression Sword Clan",
                chapters: 23,
                status: "ONGOING",
                description: "The Great Northern Wall. The Dragon Knights. The Lords of the Winter Mountains. The Descendants of the Primordial Dragon. These are the various titles of the Grand Ducal Clan Ragnar, which boasted a rich, thousand...",
                image: "img/1.png" // Path to your image
            },
            {
                title: "Reincarnated as a Genius Prodigy of a Prestigious Family",
                originalTitle: "명가의 영대로 재능천재로 환생했다 | Reborn as the Greatest Talent of the Noble Family",
                chapters: 24,
                status: "ONGOING",
                description: "His talent was forged on the battlefield, but before he could fully develop it, he died. However, when he opened his eyes again, he realized he had been reborn as Dane Sogres, the youngest son of a prestigious count...",
                image: "img/1.png" // Path to your image
            },
            {
                title: "Regressing as the Reincarnated Bastard of the Sword Clan",
                originalTitle: "화귀검가의 서자가 사는 법 | How to Survive as the Bastard of the Regression Sword Clan",
                chapters: 23,
                status: "ONGOING",
                description: "The Great Northern Wall. The Dragon Knights. The Lords of the Winter Mountains. The Descendants of the Primordial Dragon. These are the various titles of the Grand Ducal Clan Ragnar, which boasted a rich, thousand...",
                image: "img/1.png" // Path to your image
            },
            {
                title: "Reincarnated as a Genius Prodigy of a Prestigious Family",
                originalTitle: "명가의 영대로 재능천재로 환생했다 | Reborn as the Greatest Talent of the Noble Family",
                chapters: 24,
                status: "ONGOING",
                description: "His talent was forged on the battlefield, but before he could fully develop it, he died. However, when he opened his eyes again, he realized he had been reborn as Dane Sogres, the youngest son of a prestigious count...",
                image: "img/1.png" // Path to your image
            }
        ];

        function createComicCard(comic) {
            return `
                <div class="comic-card">
                    <img src="${comic.image}" alt="${comic.title}" class="comic-cover">
                    <div class="comic-info">
                        <h2 class="comic-title">${comic.title}</h2>
                        <p class="comic-original-title">${comic.originalTitle}</p>
                        <div class="comic-meta">
                            <span class="stars">★★★★★</span>
                            <span class="status">${comic.status}</span>
                        </div>
                        <p class="comic-description">${comic.description}</p>
                    </div>
                </div>
            `;
        }

        const comicsContainer = document.getElementById('comicsContainer');
        comics.forEach(comic => {
            comicsContainer.innerHTML += createComicCard(comic);
        });
    </script>
</body>
</html>
