            padding: 0;

        }

        :root {
            --bg-primary: rgb(13, 13, 13);
            --bg-secondary: rgba(30, 41, 59, 0.5);
            --bg-hover: rgba(51, 65, 85, 0.5);
            --text-primary: white;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        html[data-theme="light"] {
            --bg-primary: rgb(240, 240, 240);
            --bg-secondary: rgba(226, 232, 240, 0.8);
            --bg-hover: rgba(203, 213, 225, 0.8);
            --text-primary: rgb(15, 15, 15);
            --text-secondary: rgba(15, 15, 15, 0.6);
            --border-color: rgba(15, 15, 15, 0.1);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        header {
            background-color: var(--bg-primary);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        nav a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .comics-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .comic-card {
            display: flex;
            gap: 1rem;
        }

        .comic-cover {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
        }

        .comic-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .comic-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .comic-original-title {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .comic-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chapters {
            color: var(--text-secondary);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .chapters::before {
            content: "📄";
            font-size: 0.875rem;
        }

        .status {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-right: 0.25rem;
        }

        /* Status Colors - These remain the same in both light/dark mode */
        .status-ongoing {
            background-color: rgb(22, 101, 52);
            color: rgb(74, 222, 128);
        }

        .status-paused {
            background-color: rgb(153, 101, 21);
            color: rgb(255, 193, 7);
        }

        .status-completed {
            background-color: rgb(28, 58, 106);
            color: rgb(129, 178, 255);
        }

        .status-dropped {
            background-color: rgb(252, 3, 19);
            color: rgb(242, 240, 240);
        }
        /* Tag button color */
        .status-manhwa {
            background-color: rgb(220, 38, 38);
            color: rgb(254, 226, 226);
        }
        .status-manhua {
            background-color: rgb(220, 38, 38);
            color: rgb(254, 226, 226);
        }

        .comic-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        /* Button Styles */
        .action-button {
            background-color: var(--bg-secondary);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .action-button:hover {
            background-color: var(--bg-hover);
        }

        .button-logo {
            width: 16px;
            height: 16px;
        }

        .button-text {
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        /* Search Bar Styles */
        .search-container {
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .search-bar {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--text-secondary);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .logo {
            width: 32px;
            height: 32px;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hamburger Menu Styles */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .hamburger-menu span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        /* Mobile nav styles */
        .mobile-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .mobile-nav.active {
            transform: translateX(0);
        }

        .mobile-nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .close-menu {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        .mobile-nav-links {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .mobile-nav-links a {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-primary); /* This adds the text color */
            text-decoration: none; /* This removes the underline */

        /* Responsive Styles */
        @media (max-width: 767px) {
            .nav-left a {
                display: none;
            }
            
            .hamburger-menu {
                display: flex;
                margin-right: 1rem;
            }

            .comics-container {

                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;

            .comic-card {
                gap: 1.5rem;
            }

            .comic-cover {

                height: 240px;
            }

            .comic-title {
                font-size: 1.25rem;
            }

            header {
                padding: 1rem 2rem;
            }

            main {
                padding: 2rem;
            }

            nav a {

            }

            .search-container {
                max-width: 600px;
                margin: 0 auto 2rem auto;
            }
            
            .mobile-nav {
                display: none;
            }
        }
    </style>

    <script>
        // Theme toggle functionality
        const htmlElement = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        // Check for saved theme preference or use device preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            htmlElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        } else {
            // Use device preference if available
            const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = prefersDarkMode ? 'dark' : 'light';
            htmlElement.setAttribute('data-theme', initialTheme);
            updateThemeIcon(initialTheme);
        }

        // Toggle theme function
        function toggleTheme() {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        // Update theme icon based on current theme
        function updateThemeIcon(theme) {
            themeIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        themeToggle.addEventListener('click', toggleTheme);

        // Mobile menu functionality
        const hamburgerMenu = document.getElementById('hamburgerMenu');
        const mobileNav = document.getElementById('mobileNav');
        const closeMenu = document.getElementById('closeMenu');

        hamburgerMenu.addEventListener('click', () => {
            mobileNav.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling when menu is open
        });

        closeMenu.addEventListener('click', () => {
            mobileNav.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restore scrolling
        });

        function createComicCard(comic) {
            // Create status elements for each status in the array
            let statusElements = '';
            
            if (Array.isArray(comic.statuses)) {
                statusElements = comic.statuses.map(status => {
                    let statusClass = '';
                    switch (status) {
                        case "ONGOING":
                            statusClass = "status-ongoing";
                            break;
                        case "PAUSED":
                            statusClass = "status-paused";
                            break;
                        case "COMPLETED":
                            statusClass = "status-completed";
                            break;
                        case "DROPPED":
                            statusClass = "status-dropped";
                            break;
                        case "MANHWA":
                            statusClass = "status-manhwa";
                            break;
                        case "MANHUA":
                            statusClass = "status-manhua";
                            break;
                        default:
                            statusClass = "";
                    }
                    
                    return `<span class="status ${statusClass}">${status}</span>`;
                }).join('');
            } else if (comic.status) {
                // For backward compatibility with existing data
                let statusClass = '';
                switch (comic.status) {
                    case "ONGOING":
                        statusClass = "status-ongoing";
                        break;
                    case "PAUSED":
                        statusClass = "status-paused";
                        break;
                    case "COMPLETED":
                        statusClass = "status-completed";
                        break;
                    case "DROPPED":
                        statusClass = "status-dropped";
                        break;
                    default:
                        statusClass = "";
                }
                
                statusElements = `<span class="status ${statusClass}">${comic.status}</span>`;
            }

            // Check if links exist before creating action buttons
            let actionButtons = '';
            if (comic.readLink && comic.rawIcon) {
                actionButtons += `
                    <a href="${comic.readLink}" class="action-button" target="_blank">
                        <img src="${comic.rawIcon}" alt="Raw" class="button-logo">
                        <span class="button-text">Raw</span>
                    </a>
                `;
            }
            
            if (comic.favLink && comic.engIcon) {
                actionButtons += `
                    <a href="${comic.favLink}" class="action-button" target="_blank">
                        <img src="${comic.engIcon}" alt="Eng" class="button-logo">
                        <span class="button-text">Eng</span>
                    </a>
                `;
            }

            return `
                <div class="comic-card">
                    <picture>
                        <source media="(min-width: 768px)" srcset="${comic.image}">
                        <img src="${comic.image}" alt="${comic.title}" class="comic-cover">
                    </picture>
                    <div class="comic-info">
                        <h2 class="comic-title">${comic.title}</h2>
                        <p class="comic-original-title">${comic.originalTitle}</p>
                        <div class="comic-meta">
                            <span class="chapters">${comic.chapters} Ch</span>
                            ${statusElements}
                        </div>
                        <div class="comic-actions">
                            ${actionButtons}
                        </div>
                    </div>
                </div>
            `;
        }

        // Search functionality
        const searchBar = document.getElementById('searchBar');
        const comicsContainer = document.getElementById('comicsContainer');

        function filterComics(searchTerm) {
            searchTerm = searchTerm.toLowerCase().trim();
            
            const filteredComics = comics.filter(comic => {
                const titleMatch = comic.title.toLowerCase().includes(searchTerm);
                const originalTitleMatch = comic.originalTitle.toLowerCase().includes(searchTerm);
                
                // Check statuses array if it exists
                let statusMatch = false;
                if (Array.isArray(comic.statuses)) {
                    statusMatch = comic.statuses.some(status => 
                        status.toLowerCase().includes(searchTerm)
                    );
                } else if (comic.status) {
                    // For backward compatibility
                    statusMatch = comic.status.toLowerCase().includes(searchTerm);
                }
                
                return titleMatch || originalTitleMatch || statusMatch;
            });
            
            if (filteredComics.length === 0) {
                comicsContainer.innerHTML = '<div class="no-results">No comics found matching your search.</div>';
            } else {
                comicsContainer.innerHTML = filteredComics.map(createComicCard).join('');
            }
        }

        // Event listener for search input
        searchBar.addEventListener('input', (e) => {
            const searchTerm = e.target.value;
            if (searchTerm === '') {
                displayAllComics();
            } else {
                filterComics(searchTerm);
            }
        });

        // Display all comics when page loads
        function displayAllComics() {
            comicsContainer.innerHTML = comics.map(createComicCard).join('');
        }

        // Display all comics when page loads
        displayAllComics();
    </script>
